spring.application.name=Poker

server.port=${SERVER_PORT}

logging.level.root=INFO
logging.level.com.pokergame=INFO

# JWT Configuration
app.jwt.base64-secret=${JWT_SECRET}
jwt.expirationMillis=${JWT_EXPIRATION_MILLIS}

# Security & CORS
app.security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
poker.security.trust-proxy=${TRUST_PROXY}

# Per-player reconnection window (2 minutes)
poker.disconnect.grace-period-ms=120000

# Delay before ready gate opens after showdown reveal (ms, 0 = immediate)
poker.round-end.display-delay-ms=0

# Shared ready countdown duration (ms)
poker.ready-countdown-ms=30000

# Rate Limiting
poker.rate-limiting.enabled=true